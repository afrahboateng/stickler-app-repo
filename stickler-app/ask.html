<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask a Question — Stickler Properties</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  @media (max-height: 900px) {
    body {
      zoom: 0.8;
    }
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #000000;
    border-radius: 44px;
    padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    border-radius: 32px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    color: #000000;
    flex-shrink: 0;
  }

  .page-header {
    padding: 6px 20px 16px;
    flex-shrink: 0;
    border-bottom: 1px solid #000000;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #000000;
    padding: 4px;
    display: flex;
  }

  .page-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: #000000;
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 78%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
  }

  .msg.assistant {
    align-self: flex-start;
    background: #F2F2F0;
    color: #000000;
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: #000000;
    color: #FFFFFF;
    border-bottom-right-radius: 4px;
  }

  .msg.pending {
    opacity: 0.5;
  }

  .chat-input-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 20px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  .chat-input-row input {
    flex: 1;
    border: 1px solid #000000;
    border-radius: 20px;
    padding: 11px 16px;
    font-size: 14px;
    outline: none;
  }

  .chat-send-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #000000;
    color: #FFFFFF;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .chat-send-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span>9:41</span>
      <span>&#9679;&#9679;&#9679;</span>
    </div>

    <div class="page-header">
      <button class="back-btn" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"></path></svg>
      </button>
      <div class="page-title">Ask a Question</div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="msg assistant">Hi! I'm the Stickler assistant. Ask me anything about the app, off-market investing, or how Stickler works.</div>
    </div>

    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Type your question...">
      <button class="chat-send-btn" id="sendBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>

  </div>
</div>

<script>
  var chatBody = document.getElementById('chatBody');
  var chatInput = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var history_ = [];

  function addMessage(role, text, isPending) {
    var div = document.createElement('div');
    div.className = 'msg ' + role + (isPending ? ' pending' : '');
    div.textContent = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    return div;
  }

  function sendQuestion() {
    var question = chatInput.value.trim();
    if (!question) return;

    addMessage('user', question);
    history_.push({ role: 'user', content: question });
    chatInput.value = '';
    sendBtn.disabled = true;

    var pendingEl = addMessage('assistant', 'Thinking...', true);

    fetch('/.netlify/functions/ask-question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question, history: history_.slice(0, -1) })
    })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        pendingEl.classList.remove('pending');
        if (data.reply) {
          pendingEl.textContent = data.reply;
          history_.push({ role: 'assistant', content: data.reply });
        } else {
          pendingEl.textContent = data.error || "Sorry, something went wrong. Try again in a moment.";
        }
      })
      .catch(function() {
        pendingEl.classList.remove('pending');
        pendingEl.textContent = "Sorry, I couldn't reach the server. Check your connection and try again.";
      })
      .finally(function() {
        sendBtn.disabled = false;
      });
  }

  sendBtn.addEventListener('click', sendQuestion);
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendQuestion();
  });
</script>

</body>
</html>
