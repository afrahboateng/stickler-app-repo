<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace — Stickler Properties</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  @media (max-height: 900px) {
    body {
      zoom: 0.8;
    }
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #000000;
    border-radius: 44px;
    padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    border-radius: 32px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    color: #000000;
    flex-shrink: 0;
  }

  .header {
    padding: 10px 20px 14px;
    flex-shrink: 0;
    border-bottom: 1px solid #000000;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #F2F2F0;
    border: 1px solid #000000;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }

  .search-bar svg {
    flex-shrink: 0;
    opacity: 0.5;
  }

  .search-bar input {
    border: none;
    outline: none;
    background: none;
    font-size: 14px;
    width: 100%;
    color: #000000;
  }

  .search-bar input::placeholder {
    color: rgba(0,0,0,0.4);
  }

  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  .sort-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid #000000;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #000000;
    cursor: pointer;
  }

  .sort-btn svg {
    flex-shrink: 0;
  }

  .results-count {
    font-size: 12px;
    font-weight: 600;
    color: #000000;
    opacity: 0.5;
  }

  .sort-menu {
    position: absolute;
    top: 42px;
    left: 0;
    background: #FFFFFF;
    border: 1px solid #000000;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    z-index: 50;
    display: none;
    overflow: hidden;
    min-width: 180px;
  }

  .sort-menu.is-open {
    display: block;
  }

  .sort-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #000000;
    background: none;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    cursor: pointer;
  }

  .sort-option:last-child {
    border-bottom: none;
  }

  .sort-option:hover,
  .sort-option.is-active {
    background: rgba(0,0,0,0.05);
  }

  .list-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  .list-content {
    height: 100%;
    overflow-y: auto;
    padding: 16px 20px 24px;
  }

  .listing-card {
    border: 1px solid #000000;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    cursor: pointer;
  }

  .listing-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }

  .listing-info {
    padding: 14px 16px;
  }

  .listing-price {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: #000000;
    margin-bottom: 4px;
  }

  .listing-address {
    font-size: 13px;
    color: #000000;
    opacity: 0.6;
    margin-bottom: 8px;
  }

  .listing-stats {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #000000;
    opacity: 0.5;
  }

  .view-map-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #000000;
    color: #FFFFFF;
    border: none;
    border-radius: 22px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }

  .view-map-btn svg {
    flex-shrink: 0;
  }

  .footer-nav {
    display: flex;
    border-top: 1px solid #000000;
    background: #000000;
    flex-shrink: 0;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 0 22px;
    background: none;
    border: none;
    cursor: pointer;
    color: #FFFFFF;
    opacity: 0.4;
  }

  .nav-item.is-active {
    opacity: 1;
  }

  .nav-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* LISTING DETAIL MODAL */
  .detail-overlay {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 900;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
  }

  .detail-overlay.is-open {
    transform: translateY(0);
    pointer-events: auto;
  }

  .detail-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
  }

  .detail-card {
    position: relative;
    background: #FFFFFF;
    border-radius: 20px 20px 0 0;
    width: 100%;
    height: 92%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .detail-photo-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .detail-photo {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }

  .detail-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #FFFFFF;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .detail-price {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 30px;
    color: #000000;
    margin-bottom: 6px;
  }

  .detail-address {
    font-size: 14px;
    color: #000000;
    opacity: 0.6;
    margin-bottom: 12px;
  }

  .detail-stats {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #000000;
    opacity: 0.5;
  }

  .detail-footer {
    flex-shrink: 0;
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  .get-funding-btn {
    width: 100%;
    background: #000000;
    color: #FFFFFF;
    border: none;
    border-radius: 10px;
    padding: 16px 0;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
  }

  /* SUPPORT MODAL */
  .support-overlay {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 800;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .support-overlay.is-open {
    transform: translateY(0);
    pointer-events: auto;
  }

  .support-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
  }

  .support-card {
    position: relative;
    background: #000000;
    border-radius: 0 0 28px 28px;
    padding: 20px 24px 28px;
    height: 56%;
  }

  .support-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .support-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .support-brand-mark {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: block;
  }

  .support-brand-mark-fallback {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: #FFFFFF;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 13px;
    font-weight: 700;
    color: #000000;
  }

  .support-brand-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
    color: #FFFFFF;
  }

  .support-close {
    background: none;
    border: none;
    color: #FFFFFF;
    opacity: 0.6;
    cursor: pointer;
    padding: 4px;
  }

  .support-greeting {
    font-size: 24px;
    font-weight: 600;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 28px;
  }

  .support-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 12px;
    cursor: pointer;
    text-align: left;
  }

  .support-row-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
  }

  .support-row-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .support-row-title {
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .support-row-subtitle {
    font-size: 12px;
    color: #FFFFFF;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span>9:41</span>
      <span>&#9679;&#9679;&#9679;</span>
    </div>

    <div class="header">
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="citySearch" type="text" placeholder="Search city, e.g. Atlanta, GA">
      </div>

      <div class="filter-row">
        <button class="sort-btn" id="sortBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M10 18h4"></path></svg>
          <span id="sortLabel">Sort by price</span>
        </button>
        <div class="results-count" id="resultsCount">0 results</div>

        <div class="sort-menu" id="sortMenu">
          <button class="sort-option" data-sort="price-asc">Lowest price</button>
          <button class="sort-option" data-sort="price-desc">Highest price</button>
          <button class="sort-option" data-sort="beds">Beds</button>
          <button class="sort-option" data-sort="baths">Bath</button>
          <button class="sort-option" data-sort="sqft">Square feet</button>
        </div>
      </div>
    </div>

    <div class="list-wrap">
      <div class="list-content" id="listContent"></div>

      <button class="view-map-btn" id="viewMapBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"></path><line x1="9" y1="7" x2="9" y2="20"></line><line x1="15" y1="4" x2="15" y2="17"></line></svg>
        View map
      </button>
    </div>

    <div class="footer-nav">
      <button class="nav-item is-active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 10V20H20V10"></path>
          <path d="M2 10L4 4H20L22 10"></path>
          <path d="M9 20V14H15V20"></path>
        </svg>
        <span class="nav-label">Marketplace</span>
      </button>
      <button class="nav-item" onclick="window.location.href='account.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <circle cx="12" cy="10" r="3"></circle>
          <path d="M6.5 18.5C7.5 16 9.5 15 12 15s4.5 1 5.5 3.5"></path>
        </svg>
        <span class="nav-label">Account</span>
      </button>
      <button class="nav-item" onclick="openSupport()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5H20V16H8L4 19V5Z"></path>
        </svg>
        <span class="nav-label">Support</span>
      </button>
    </div>

    <div class="detail-overlay" id="detailOverlay">
      <div class="detail-backdrop" onclick="closeDetail()"></div>
      <div class="detail-card">
        <div class="detail-photo-wrap">
          <img src="" alt="" class="detail-photo" id="detailPhoto">
          <button class="detail-close" onclick="closeDetail()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
          </button>
        </div>
        <div class="detail-body">
          <div class="detail-price" id="detailPrice"></div>
          <div class="detail-address" id="detailAddress"></div>
          <div class="detail-stats" id="detailStats"></div>
        </div>
        <div class="detail-footer">
          <button class="get-funding-btn" onclick="">Get Funding</button>
        </div>
      </div>
    </div>

    <div class="support-overlay" id="supportOverlay">
      <div class="support-backdrop" onclick="closeSupport()"></div>
      <div class="support-card">
        <div class="support-top-row">
          <div class="support-brand">
            <img src="../stickler-assets/android-chrome-192x192.png" alt="Stickler" class="support-brand-mark" onerror="this.style.display='none'; document.getElementById('supportBrandFallback').style.display='flex';">
            <div class="support-brand-mark-fallback" id="supportBrandFallback">SP</div>
            <div class="support-brand-name">Stickler</div>
          </div>
          <button class="support-close" onclick="closeSupport()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
          </button>
        </div>

        <div class="support-greeting">Hi there 👋<br>How can we help?</div>

        <button class="support-row" onclick="window.location.href='ask.html'">
          <div class="support-row-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5H20V16H8L4 19V5Z"></path></svg>
          </div>
          <div class="support-row-text">
            <div class="support-row-title">Messages</div>
          </div>
        </button>

        <button class="support-row" onclick="">
          <div class="support-row-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M9.5 9a2.5 2.5 0 1 1 3.2 2.4c-.8.3-1.2.8-1.2 1.6"></path><line x1="12" y1="16.5" x2="12" y2="16.5"></line></svg>
          </div>
          <div class="support-row-text">
            <div class="support-row-title">Ask a question</div>
            <div class="support-row-subtitle">AI agent and team can help</div>
          </div>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="listings.js"></script>
<script>
  var currentCity = resolveCurrentCity("atlanta");
  setLastMarketplaceView("list");
  var currentSort = null;

  var searchInput = document.getElementById('citySearch');
  var listContent = document.getElementById('listContent');
  var resultsCount = document.getElementById('resultsCount');
  var sortBtn = document.getElementById('sortBtn');
  var sortLabel = document.getElementById('sortLabel');
  var sortMenu = document.getElementById('sortMenu');

  function sortListings(listings) {
    var sorted = listings.slice();
    if (currentSort === 'price-asc') sorted.sort(function(a, b) { return a.price - b.price; });
    else if (currentSort === 'price-desc') sorted.sort(function(a, b) { return b.price - a.price; });
    else if (currentSort === 'beds') sorted.sort(function(a, b) { return b.beds - a.beds; });
    else if (currentSort === 'baths') sorted.sort(function(a, b) { return b.baths - a.baths; });
    else if (currentSort === 'sqft') sorted.sort(function(a, b) { return b.sqft - a.sqft; });
    return sorted;
  }

  var currentListings = [];

  function render() {
    currentListings = sortListings(getListingsForCity(currentCity));
    resultsCount.textContent = currentListings.length + (currentListings.length === 1 ? ' result' : ' results') + ' in ' + CITIES[currentCity].label;

    listContent.innerHTML = currentListings.map(function(p, idx) {
      return '' +
        '<div class="listing-card" onclick="openDetail(' + idx + ')">' +
          '<img src="' + p.photo + '" class="listing-photo" alt="' + p.address + '">' +
          '<div class="listing-info">' +
            '<div class="listing-price">' + formatPriceK(p.price) + '</div>' +
            '<div class="listing-address">' + p.address + '</div>' +
            '<div class="listing-stats">' + formatStats(p) + '</div>' +
          '</div>' +
        '</div>';
    }).join('');
  }

  function openDetail(idx) {
    var p = currentListings[idx];
    document.getElementById('detailPhoto').src = p.photo;
    document.getElementById('detailPhoto').alt = p.address;
    document.getElementById('detailPrice').textContent = formatPriceK(p.price);
    document.getElementById('detailAddress').textContent = p.address;
    document.getElementById('detailStats').textContent = formatStats(p);
    document.getElementById('detailOverlay').classList.add('is-open');
  }
  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('is-open');
  }

  render();

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var match = resolveCityFromQuery(searchInput.value);
      if (match) {
        currentCity = match;
        updateCurrentCity(currentCity);
        render();
      }
    }
  });

  sortBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    sortMenu.classList.toggle('is-open');
  });

  document.addEventListener('click', function() {
    sortMenu.classList.remove('is-open');
  });

  document.querySelectorAll('.sort-option').forEach(function(opt) {
    opt.addEventListener('click', function(e) {
      e.stopPropagation();
      currentSort = opt.getAttribute('data-sort');
      sortLabel.textContent = opt.textContent;
      document.querySelectorAll('.sort-option').forEach(function(o) { o.classList.remove('is-active'); });
      opt.classList.add('is-active');
      sortMenu.classList.remove('is-open');
      render();
    });
  });

  document.getElementById('viewMapBtn').addEventListener('click', function() {
    window.location.href = 'marketplace-map.html?city=' + currentCity;
  });

  function openSupport() {
    document.getElementById('supportOverlay').classList.add('is-open');
  }
  function closeSupport() {
    document.getElementById('supportOverlay').classList.remove('is-open');
  }
</script>

</body>
</html>
