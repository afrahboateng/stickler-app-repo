<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Stickler Properties</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  @media (max-height: 900px) {
    body {
      zoom: 0.8;
    }
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #000000;
    border-radius: 44px;
    padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    border-radius: 32px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    color: #000000;
    flex-shrink: 0;
  }

  .page-header {
    padding: 6px 20px 16px;
    flex-shrink: 0;
    border-bottom: 1px solid #000000;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #000000;
    padding: 4px;
    display: flex;
  }

  .page-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: #000000;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #000000;
    padding: 6px;
    display: flex;
  }

  .empty-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #F2F2F0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000000;
    opacity: 0.4;
    margin-bottom: 20px;
  }

  .empty-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 20px;
    color: #000000;
    margin-bottom: 8px;
  }

  .empty-subtitle {
    font-size: 13px;
    color: #000000;
    opacity: 0.5;
    max-width: 240px;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .ask-row {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #000000;
    border-radius: 10px;
    padding: 14px 20px;
    background: none;
    cursor: pointer;
    font-family: inherit;
  }

  .ask-row-label {
    font-size: 14px;
    font-weight: 700;
    color: #000000;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span>9:41</span>
      <span>&#9679;&#9679;&#9679;</span>
    </div>

    <div class="page-header">
      <div class="page-header-left">
        <button class="back-btn" onclick="history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"></path></svg>
        </button>
        <div class="page-title">Messages</div>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn" onclick="">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        </button>
        <button class="header-icon-btn" onclick="history.back()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
        </button>
      </div>
    </div>

    <div class="empty-wrap">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5H20V16H8L4 19V5Z"></path></svg>
      </div>
      <div class="empty-title">No Messages</div>
      <div class="empty-subtitle">Messages from the team will be shown here</div>

      <button class="ask-row" onclick="window.location.href='ask.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M9.5 9a2.5 2.5 0 1 1 3.2 2.4c-.8.3-1.2.8-1.2 1.6"></path><line x1="12" y1="16.5" x2="12" y2="16.5"></line></svg>
        <span class="ask-row-label">Ask a question</span>
      </button>
    </div>

  </div>
</div>

</body>
</html>
