<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickler Properties</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #000000;
    border-radius: 44px;
    padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #2b2b2b;
    border-radius: 32px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: opacity 0.5s ease;
  }

  .screen.is-fading {
    opacity: 0;
  }

  .splash-logo {
    width: 96px;
    height: 96px;
    border-radius: 16px;
  }

  .splash-logo-fallback {
    width: 96px;
    height: 96px;
    border-radius: 16px;
    background: #FFFFFF;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 38px;
    font-weight: 700;
    color: #000000;
  }

  .splash-tagline {
    margin-top: 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #FFFFFF;
    opacity: 0.75;
    text-align: center;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="splashScreen">
    <img src="../stickler-assets/android-chrome-512x512.png" alt="Stickler Properties" class="splash-logo" onerror="this.style.display='none'; document.getElementById('splashFallback').style.display='flex';">
    <div class="splash-logo-fallback" id="splashFallback">SP</div>
    <div class="splash-tagline">Where Opportunity Begins.</div>
  </div>
</div>

<script>
  setTimeout(function() {
    document.getElementById('splashScreen').classList.add('is-fading');
    setTimeout(function() {
      window.location.href = 'onboarding.html';
    }, 500);
  }, 1500);
</script>

</body>
</html>
